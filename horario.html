<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Horario Gastronómico</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Horario Gastronómico Semanal</h1>

<table border="1">

    <tr>
        <th>Día</th>
        <th>Desayuno</th>
        <th>Almuerzo</th>
        <th>Cena</th>
    </tr>

    <tr>
        <td>Lunes</td>
        <td>Café con tostadas</td>
        <td>Pollo con arroz</td>
        <td>Ensalada</td>
    </tr>

    <tr>
        <td>Martes</td>
        <td>Mate y medialunas</td>
        <td rowspan="2">Pasta casera</td>
        <td>Sopa</td>
    </tr>

    <tr>
        <td>Miércoles</td>
        <td>Yogur con cereal</td>
        <td>Sandwich</td>
    </tr>

    <tr>
        <td>Jueves</td>
        <td colspan="3">Día especial de comida libre</td>
    </tr>

    <tr>
        <td>Viernes</td>
        <td>Facturas</td>
        <td>Hamburguesa</td>
        <td>Pizza</td>
    </tr>

</table>

</body>
</html>
